apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-cloud-credentials
  namespace: monitoring
  annotations:
    # Materialize the credential secret before the Alloy collectors that mount it.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  # extract maps every JSON key in the AWS SM secret straight through to
  # k8s secret keys: prometheus-username, loki-username, otlp-username,
  # profiles-username, access-token.
  dataFrom:
    - extract:
        key: family-pickem/monitoring/grafana-cloud
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
