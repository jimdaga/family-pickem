# Production values for family-pickem
# Used by ArgoCD Application: pickem-prd

fullnameOverride: "family-pickem-prd"
replicaCount: 1

image:
  repository: familypickem/pickem-django
  tag: ""  # Set by chart appVersion (from GitHub Release)
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "6m"
  hosts:
    - host: family-pickem.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: pickem-prd-tls
      hosts:
        - family-pickem.com

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        database: "pickem"
  primary:
    persistence:
      existingClaim: postgres-prd-pvc
# In-process scheduler replaces the legacy cron.sh CronJob (now removed).
scheduler:
  enabled: true

# pickemctl retired — userStats is now computed by the in-process `update_stats`
# management command (part of the update_all pipeline).

externalSecrets:
  enabled: true
  clusterSecretStore: aws-secrets-manager
  envvarsKey: family-pickem/prd/envvars

backup:
  enabled: true
  schedule: "0 2 * * *"
  s3Bucket: family-pickem-backups
  s3Prefix: postgres
  keepCount: 5

healthchecks:
  enabled: true
