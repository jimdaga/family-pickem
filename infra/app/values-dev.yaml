# Dev values for family-pickem
# Used by ArgoCD Application: pickem-dev

fullnameOverride: "family-pickem-dev"
replicaCount: 1

image:
  repository: familypickem/pickem-django
  tag: ""  # Tracks latest from main
  pullPolicy: Always

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: dev.family-pickem.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: pickem-dev-tls
      hosts:
        - dev.family-pickem.com

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        database: "pickem"
  primary:
    persistence:
      storageClass: "manual"
      size: 10Gi

# In-process scheduler replaces the legacy cron.sh CronJob (now removed).
scheduler:
  enabled: true

# pickemctl retired — userStats is now computed by the in-process `update_stats`
# management command (part of the update_all pipeline).

externalSecrets:
  enabled: true
  clusterSecretStore: aws-secrets-manager
  envvarsKey: family-pickem/dev/envvars

backup:
  enabled: false

healthchecks:
  enabled: true
