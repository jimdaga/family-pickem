name: Publish Artifacts

on:
  release:
    types: [published]

jobs:
  run_tests:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r pickem/requirements.txt

      - name: Run tests
        run: cd pickem && python manage.py test --settings=pickem.test_settings --verbosity=2

  publish_docker:
    needs: [run_tests]
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker tags
        id: docker_vars
        run: |
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          RELEASE_VERSION=${RELEASE_TAG#family-pickem-}
          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_version=${RELEASE_VERSION}"
            echo 'tags<<EOF'
            echo "familypickem/pickem-django:${RELEASE_VERSION}"
            echo "familypickem/pickem-django:${RELEASE_TAG}"
            echo "familypickem/pickem-django:latest"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./docker/app/Dockerfile
          push: true
          tags: ${{ steps.docker_vars.outputs.tags }}

  publish_helm:
    needs: [run_tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    # Serialize with the main-branch "-latest" workflow because both publish
    # directly to gh-pages.
    concurrency:
      group: helm-chart-release
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set output
        id: vars
        run: |
          RELEASE_TAG=${GITHUB_REF#refs/*/}
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "helm_version=${RELEASE_TAG#family-pickem-}" >> "$GITHUB_OUTPUT"

      - name: Update Helm Tags
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          HELM_VERSION: ${{ steps.vars.outputs.helm_version }}
        run: |
          echo "${RELEASE_TAG}"
          sed -i "s/0.0.0/${HELM_VERSION}/g" ./charts/family-pickem/Chart.yaml
          cat ./charts/family-pickem/Chart.yaml

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Package chart
        env:
          HELM_VERSION: ${{ steps.vars.outputs.helm_version }}
        run: |
          mkdir -p .chart-packages
          helm dependency build ./charts/family-pickem
          helm package ./charts/family-pickem --destination .chart-packages
          test -f ".chart-packages/family-pickem-${HELM_VERSION}.tgz"

      - name: Publish chart to gh-pages
        env:
          HELM_VERSION: ${{ steps.vars.outputs.helm_version }}
        run: |
          git fetch origin gh-pages
          rm -rf .gh-pages
          git worktree add .gh-pages origin/gh-pages
          cp ".chart-packages/family-pickem-${HELM_VERSION}.tgz" .gh-pages/
          (
            cd .gh-pages
            helm repo index . \
              --url https://jimdaga.github.io/family-pickem \
              --merge index.yaml
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
            git add "family-pickem-${HELM_VERSION}.tgz" index.yaml
            git diff --cached --quiet && echo "No chart changes to commit" && exit 0
            git commit -m "chore: publish helm chart ${HELM_VERSION}"
            git push origin HEAD:gh-pages
          )

      - name: Verify chart version is in published index
        env:
          HELM_VERSION: ${{ steps.vars.outputs.helm_version }}
        run: |
          for attempt in $(seq 1 18); do
            if curl -fsSL https://jimdaga.github.io/family-pickem/index.yaml | grep -Fq "version: ${HELM_VERSION}"; then
              exit 0
            fi
            echo "Waiting for gh-pages to publish chart ${HELM_VERSION} (attempt ${attempt}/18)"
            sleep 10
          done
          echo "Chart ${HELM_VERSION} was not visible in the published Helm index"
          exit 1

  update_argocd:
    name: Update ArgoCD production app version
    needs: [publish_helm]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # PAT owned by a repo admin. main is protected, and the default
          # GITHUB_TOKEN (github-actions[bot]) can't bypass the PR requirement.
          # This repo is user-owned with enforce_admins=false, so a PAT owned
          # by the admin can push to main directly. actions/checkout persists
          # this credential for the later `git push`.
          token: ${{ secrets.ARGOCD_PUSH_TOKEN }}

      - name: Update ArgoCD app version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#family-pickem-}
          echo "Updating pickem-prd targetRevision to ${VERSION}"
          sed -i "s/targetRevision: \"[0-9][^\"]*\"/targetRevision: \"${VERSION}\"/" infra/argocd/applications/pickem-prd.yaml
          cat infra/argocd/applications/pickem-prd.yaml

      - name: Commit and push
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#family-pickem-}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/argocd/applications/pickem-prd.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update prd to ${VERSION}"
          # Pushes as the ARGOCD_PUSH_TOKEN owner (repo admin), bypassing the
          # protected-branch PR requirement. Once this lands on main the
          # app-of-apps root Application auto-reconciles prd to the new chart.
          git push
