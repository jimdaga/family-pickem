name: Pull Request Tests

on:
  pull_request:
    branches:
      - main

jobs:
  run_tests:
    name: Django and Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r pickem/requirements.txt

      - name: Run Django system checks
        run: cd pickem && python manage.py check --settings=pickem.test_settings

      - name: Check for missing migrations
        run: cd pickem && python manage.py makemigrations --check --dry-run --settings=pickem.test_settings

      - name: Run tests
        run: cd pickem && python manage.py test --settings=pickem.test_settings --verbosity=2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:prod
