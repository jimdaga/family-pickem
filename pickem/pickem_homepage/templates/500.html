<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Something went wrong · Family Pick'em</title>
    <style>
        /* Inline + self-contained on purpose: a 500 may mean static assets or the
           template context are unavailable, so this page depends on neither. */
        :root { color-scheme: light dark; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: #f9fafb; color: #1f2937;
            text-align: center; padding: 2rem;
        }
        @media (prefers-color-scheme: dark) { body { background: #0B0E13; color: #e5e7eb; } }
        .wrap { max-width: 28rem; }
        .code { font-size: 3.5rem; font-weight: 900; letter-spacing: -0.03em; color: #0B3D91; margin: 0; }
        @media (prefers-color-scheme: dark) { .code { color: #6ea0ff; } }
        h1 { font-size: 1.5rem; font-weight: 800; margin: 0.5rem 0 0; }
        p { color: #6b7280; margin: 0.75rem 0 1.5rem; }
        @media (prefers-color-scheme: dark) { p { color: #9ca3af; } }
        a.btn {
            display: inline-block; background: #0B3D91; color: #fff; text-decoration: none;
            padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div style="font-size:3rem" aria-hidden="true">🏈</div>
        <p class="code">500</p>
        <h1>Fumble on our end.</h1>
        <p>Something went wrong while loading this page. Our team is on it &mdash; try again in a moment.</p>
        <a class="btn" href="/">Back to Home</a>
    </div>
</body>
</html>
