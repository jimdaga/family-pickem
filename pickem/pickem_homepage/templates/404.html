{% load static %}
<!DOCTYPE html>
<html lang="en" class="{% if user_theme_preference == 'dark' %}dark{% endif %}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 · Family Pick'em</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'images/windowlogo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Urbanist:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-bg-dark transition-colors duration-200">
    <main class="min-h-screen flex flex-col items-center justify-center px-6 py-16 text-center">
        <a href="/" aria-label="Family Pick'em home" class="mb-8 inline-block hover:opacity-80 transition-opacity">
            <img src="{% static 'images/logo.png' %}" alt="Family Pick'em" class="h-14 w-auto mx-auto">
        </a>

        <div class="relative">
            <div style="font-family:'Urbanist',sans-serif"
                 class="select-none text-[7rem] sm:text-[9rem] font-black leading-none tracking-tighter text-primary/15 dark:text-white/10">
                404
            </div>
            <div class="absolute inset-0 flex items-center justify-center text-5xl sm:text-6xl" aria-hidden="true">🏈</div>
        </div>

        <h1 style="font-family:'Urbanist',sans-serif"
            class="mt-2 text-2xl sm:text-3xl font-extrabold text-slate-800 dark:text-white">
            Whoops &mdash; that play didn&rsquo;t work out.
        </h1>
        <p class="mt-3 max-w-md text-slate-500 dark:text-slate-400">
            We can&rsquo;t find the page you&rsquo;re looking for. It may have been benched,
            traded, or never made the roster. Let&rsquo;s get you back in the game.
        </p>

        <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
            <a href="/"
               class="inline-flex items-center gap-2 rounded-xl bg-primary px-5 py-3 font-semibold text-white shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity">
                Back to Home
            </a>
            <a href="javascript:history.back()"
               class="inline-flex items-center gap-2 rounded-xl border border-slate-300 dark:border-slate-600 px-5 py-3 font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                Go Back
            </a>
        </div>

        <p class="mt-10 text-xs uppercase tracking-widest text-slate-400 dark:text-slate-600">Error 404 &middot; Page not found</p>
    </main>
</body>
</html>
